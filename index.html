<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description"
        content="Enter the Wizard's Portal — a magical login experience inspired by the world of Harry Potter.">
    <title>⚡ Wizard's Portal — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">

    <!-- Page Transition -->
    <div class="page-transition" id="pageTransition">
        <div class="rune-spinner">
            <svg viewBox="0 0 100 100" class="rune-svg">
                <circle cx="50" cy="50" r="45" class="rune-circle rune-outer" />
                <circle cx="50" cy="50" r="32" class="rune-circle rune-inner" />
                <polygon points="50,10 90,75 10,75" class="rune-triangle" />
                <circle cx="50" cy="50" r="6" class="rune-center" />
            </svg>
            <p class="loading-text">Casting Spells…</p>
        </div>
    </div>

    <!-- Background -->
    <div class="page-bg">
        <div class="page-bg__img" role="img" aria-label="Hogwarts castle at night"></div>
        <div class="page-bg__overlay"></div>
    </div>

    <!-- Particles -->
    <canvas id="particleCanvas"></canvas>

    <!-- Mist -->
    <div class="magical-bg">
        <div class="mist mist-1"></div>
        <div class="mist mist-2"></div>
        <div class="mist mist-3"></div>
    </div>

    <!-- Login Card -->
    <main class="login-container">
        <div class="magic-card" id="loginCard">
            <div class="card-glow"></div>

            <div class="card-header">
                <div class="emblem">⚡</div>
                <h1 class="card-title">Wizard's Portal</h1>
                <p class="card-subtitle">Enter your magical credentials</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <input type="text" id="teamId" name="teamId" required autocomplete="off" placeholder=" ">
                    <label for="teamId">Team ID</label>
                    <div class="input-glow"></div>
                    <div class="input-sparkle"></div>
                </div>

                <div class="input-group">
                    <input type="text" id="houseName" name="houseName" required autocomplete="off" placeholder=" ">
                    <label for="houseName">House Name</label>
                    <div class="input-glow"></div>
                    <div class="input-sparkle"></div>
                </div>

                <div class="input-group">
                    <input type="text" id="roomNumber" name="roomNumber" required autocomplete="off" placeholder=" ">
                    <label for="roomNumber">Room Number</label>
                    <div class="input-glow"></div>
                    <div class="input-sparkle"></div>
                </div>

                <button type="submit" class="magic-btn magic-btn--gold" id="loginBtn">
                    <span class="btn-text">Enter the Chamber</span>
                    <span class="btn-magic">
                        <span class="spark s1"></span>
                        <span class="spark s2"></span>
                        <span class="spark s3"></span>
                        <span class="spark s4"></span>
                    </span>
                </button>
            </form>

            <div class="error-msg" id="errorMsg">
                <span class="error-icon">🛡️</span>
                <span class="error-text">The enchantment rejects your credentials!</span>
            </div>
        </div>

        <p class="footer-text">✦ Only authorized wizards may proceed ✦</p>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>

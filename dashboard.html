<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="The Wizard's Chamber — your magical dashboard awaits.">
    <title>⚡ Wizard's Chamber — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">

    <!-- Page Transition (starts active) -->
    <div class="page-transition active" id="pageTransition">
        <div class="rune-spinner">
            <svg viewBox="0 0 100 100" class="rune-svg">
                <circle cx="50" cy="50" r="45" class="rune-circle rune-outer"/>
                <circle cx="50" cy="50" r="32" class="rune-circle rune-inner"/>
                <polygon points="50,10 90,75 10,75" class="rune-triangle"/>
                <circle cx="50" cy="50" r="6" class="rune-center"/>
            </svg>
            <p class="loading-text">Opening the Chamber…</p>
        </div>
    </div>

    <!-- Background -->
    <div class="page-bg">
        <div class="page-bg__img" role="img" aria-label="Magical wizard chamber"></div>
        <div class="page-bg__overlay"></div>
    </div>

    <!-- Particles -->
    <canvas id="particleCanvas"></canvas>

    <!-- Mist -->
    <div class="magical-bg">
        <div class="mist mist-1"></div>
        <div class="mist mist-2"></div>
        <div class="mist mist-3"></div>
    </div>

    <!-- Floating Candles -->
    <div class="candles-container" id="candlesContainer">
        <div class="candle candle-1"><div class="flame"></div><div class="candle-body"></div></div>
        <div class="candle candle-2"><div class="flame"></div><div class="candle-body"></div></div>
        <div class="candle candle-3"><div class="flame"></div><div class="candle-body"></div></div>
        <div class="candle candle-4"><div class="flame"></div><div class="candle-body"></div></div>
        <div class="candle candle-5"><div class="flame"></div><div class="candle-body"></div></div>
        <div class="candle candle-6"><div class="flame"></div><div class="candle-body"></div></div>
        <div class="candle candle-7"><div class="flame"></div><div class="candle-body"></div></div>
    </div>

    <!-- Dashboard Card -->
    <main class="dashboard-container">
        <div class="magic-card dashboard-card" id="dashboardCard">
            <div class="card-glow"></div>

            <div class="dashboard-header">
                <div class="emblem">⚡</div>
                <h1 class="dashboard-title">Welcome, Wizard.<br>
                    <span class="highlight">Your chamber has been unlocked.</span>
                </h1>
                <div class="title-underline"></div>
                <div class="house-badge" id="houseBadge"></div>
            </div>

            <!-- Info Cards -->
            <div class="info-grid">
                <div class="info-card" id="infoTeamId">
                    <div class="info-icon">🏷️</div>
                    <div class="info-label">Team ID</div>
                    <div class="info-value" id="displayTeamId">—</div>
                </div>
                <div class="info-card" id="infoHouseName">
                    <div class="info-icon">🏰</div>
                    <div class="info-label">House</div>
                    <div class="info-value" id="displayHouseName">—</div>
                </div>
                <div class="info-card" id="infoLocation">
                    <div class="info-icon">🚪</div>
                    <div class="info-label">Location</div>
                    <div class="info-value" id="displayLocation">—</div>
                </div>
            </div>

            <!-- Quote -->
            <div class="magical-quote">
                <p>"Alohomora" ~ the spell worked!. The path ahead is now revealed. Please confirm your location to Hashtag Member to continue your quest !"</p>
                <!-- <span class="quote-author">— Akshat Jain </span> -->
            </div>

            <!-- Sign Out -->
            <button class="magic-btn magic-btn--purple" id="signoutBtn">
                <span class="btn-text">Sign Out</span>
                <span class="btn-magic">
                    <span class="spark s1"></span>
                    <span class="spark s2"></span>
                    <span class="spark s3"></span>
                    <span class="spark s4"></span>
                </span>
            </button>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
